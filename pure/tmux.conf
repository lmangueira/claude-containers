set -g default-terminal "screen-256color"
set -g history-limit 50000
set -g mouse on

# Prefijo: C-a en lugar de C-b
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Recargar config
bind r source-file ~/.tmux.conf \; display "Config recargada"

# Splits intuitivos (mantienen el directorio actual)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Navegación entre panes con Alt+flechas (sin prefijo)
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Numeración desde 1
set -g base-index 1
setw -g pane-base-index 1

# Statusbar
set -g status-style bg=black,fg=white
set -g status-left  "#[fg=green][#S] "
set -g status-right "#[fg=cyan]%H:%M %d-%b"
